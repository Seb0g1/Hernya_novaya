# =============================================================================
# 413 Request Entity Too Large при POST /api/media — это Nginx (лимит ~1m по умолчанию),
# пока запрос не доходит до Next.js. Нужна директива ниже в ТОМ ЖЕ server { },
# который обслуживает твой домен (тот, где proxy_pass на Node/PM2).
# =============================================================================

# Вариант 1 — только для этого сайта (предпочтительно): внутри server { ... }
client_max_body_size 150m;

# Вариант 2 — на весь сервер: один раз в http { } в /etc/nginx/nginx.conf
# (тогда все виртуальные хосты разрешат большие тела)
#   client_max_body_size 150m;

# После правки:
#   sudo nginx -t && sudo systemctl reload nginx

